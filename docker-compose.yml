services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: capsule-backend-prod
    ports:
      - "9005:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - CAPSULE_FILE_PATH=/app/data/capsule.json
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:4200,http://127.0.0.1:4200,http://localhost:9004,http://127.0.0.1:9004}
    # Option 1: Sans volume (données réinitialisées au redémarrage)
    # Pas de volumes déclarés - le fichier sera créé dans le container

    # Option 2: Avec volume si vous voulez persister les données
    # volumes:
    #   - capsule-data:/app/data

    networks:
      - capsule-network
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        CONFIGURATION: production
    container_name: capsule-frontend-prod
    ports:
      - "9004:9004"
    depends_on:
      - backend
    networks:
      - capsule-network
    restart: always
    environment:
      - BACKEND_URL=${BACKEND_URL}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.capsule-frontend.rule=Host(`capsule.dandadev.cloud`)"
      - "traefik.http.routers.capsule-frontend.entrypoints=websecure"
      - "traefik.http.routers.capsule-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.capsule-frontend.loadbalancer.server.port=8080"

networks:
  capsule-network:
    driver: bridge

# Décommentez cette section si vous voulez persister les données
# volumes:
#   capsule-data:
#     driver: local
