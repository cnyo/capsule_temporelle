services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: capsule-backend-prod
    ports:
      - "9005:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - CAPSULE_FILE_PATH=/app/data/capsule.json
    # Option 1: Sans volume (données réinitialisées au redémarrage)
    # Pas de volumes déclarés - le fichier sera créé dans le container

    # Option 2: Avec volume si vous voulez persister les données
    # volumes:
    #   - capsule-data:/app/data

    networks:
      - capsule-network
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        CONFIGURATION: production
    container_name: capsule-frontend-prod
    ports:
      - "9004:8080"
    depends_on:
      - backend
    networks:
      - capsule-network
    restart: always
    environment:
      - BACKEND_URL=http://backend:8080

networks:
  capsule-network:
    driver: bridge

# Décommentez cette section si vous voulez persister les données
# volumes:
#   capsule-data:
#     driver: local
