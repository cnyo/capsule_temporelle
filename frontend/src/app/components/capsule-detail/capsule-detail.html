<section class="detail card">

  <button routerLink="/" class="btn-back">
    ← Retour à l’accueil
  </button>

  <h2>Capsule ouverte</h2>

  @if (capsule(); as capsule) {
    <div class="message">
        {{ capsule.message }}
    </div>
    <p class="date">
      Capsule scellée le {{ capsule.createdDate | date:'longDate' }}
    </p>
  }
</section>
