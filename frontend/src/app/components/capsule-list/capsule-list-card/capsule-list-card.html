<article class="capsule">
  @if (capsuleResume().launched) {
    <a [routerLink]="['/capsule', capsuleResume().id]" class="capsule-date">Ouvrir la capsule du {{ capsuleResume().launchDate | date:'dd/MM/yyyy' }}</a>
  } @else {
    <span>À ouvrir le : {{ capsuleResume().launchDate | date:'dd/MM/yyyy' }}</span>
  }
</article>
