<form class="capsule-form">
  <div class="form-group">
    <label for="message">Message</label>
    <textarea id="message" placeholder="Écris ton message pour le futur..."></textarea>
  </div>

  <div class="form-group">
    <label for="date">Date d’ouverture</label>
    <input type="date" id="date">
  </div>

  <button type="submit">Sceller la capsule</button>
</form>

<section class="capsules">
  <h2>Capsules scellées</h2>

  <div class="capsule-card">
    <p class="capsule-message">
      N’oublie jamais pourquoi tu as commencé.
    </p>
    <span class="capsule-date">À ouvrir le : 01/01/2030</span>
  </div>

  <div class="capsule-card">
    <p class="capsule-message">
      Si tu lis ceci, alors tu as survécu à l’Upside Down.
    </p>
    <span class="capsule-date">À ouvrir le : 15/06/2035</span>
  </div>
</section>
